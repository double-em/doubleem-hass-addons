name: "LLM AI Dashboard"
description: "AI Provider management, voice cloning, TTS, and AI memory for Home Assistant"
version: "1.0.14"
slug: "llm_ai_dashboard"
init: false
arch:
  - amd64
startup: services
boot: auto
hassio_role: default
ingress: true
panel_icon: mdi:robot
panel_title: LLM AI
panel_header: LLM AI Dashboard

# Network - HA ingress routes to port 8000
ports:
  8000/tcp: null

# Configuration options
options:
  default_provider: "minimax"
  default_voice_speed: 1.0
  default_diffusion_steps: 32

schema:
  default_provider: str
  default_voice_speed: float(0.5,2.0)
  default_diffusion_steps: int(1,100)

image: "ghcr.io/double-em/llm-hass-app"
