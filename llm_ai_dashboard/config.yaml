name: "LLM AI Dashboard"
description: "AI Provider management, voice cloning, TTS, and AI memory for Home Assistant"
version: "1.4.4"
slug: "llm_ai_dashboard"
init: false
arch:
  - amd64
startup: services
boot: auto
hassio_role: default
ingress: true
ingress_panel: true
panel_icon: mdi:robot
panel_title: LLM AI
panel_header: LLM AI Dashboard

# Network - HA ingress routes to port 8099 inside the container; null
# means "don't publish to the host" (ingress uses the internal port only).
ports:
  8099/tcp: null

# Configuration options
options:
  default_provider: "minimax"
  default_voice_speed: 1.0
  default_diffusion_steps: 32

schema:
  default_provider: str
  default_voice_speed: float(0.5,2.0)
  default_diffusion_steps: int(1,100)

image: "ghcr.io/double-em/llm-hass-app"
# The supervisor pulls the `latest` tag by default; the addon store
# (via `ha-updates.sh`) detects newer image digests on the registry and
# triggers an in-place update. So pinning a tag here would actually
# break that flow — leave as `:latest`-equivalent.
